<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Baseflow Docs</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fa;
        --text: #17202a;
        --muted: #596579;
        --border: #d9dee7;
        --card: #ffffff;
        --accent: #0b6bcb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #11151b;
          --text: #edf2f7;
          --muted: #a9b4c3;
          --border: #303846;
          --card: #171d26;
          --accent: #7ab7ff;
        }
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(880px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 0 0 32px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      a.product {
        display: block;
        min-height: 112px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        color: inherit;
        text-decoration: none;
      }

      a.product:focus,
      a.product:hover {
        border-color: var(--accent);
        outline: none;
      }

      .name {
        display: block;
        margin-bottom: 8px;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .description {
        color: var(--muted);
      }

      footer {
        margin-top: 40px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      footer a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Baseflow Docs</h1>
      <p>Documentation for Baseflow projects and tools.</p>

      <div class="products">
        <a class="product" href="/snowdag/">
          <span class="name">Snowdag</span>
          <span class="description">Dagster OSS on Snowflake Snowpark Container Services.</span>
        </a>
      </div>

      <footer>
        <a href="/privacy/">Privacy Policy</a>
      </footer>
    </main>
  </body>
</html>
